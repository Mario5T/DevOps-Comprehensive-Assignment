# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose

version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    volumes:
      - mongo_data:/data/db     
    networks:
      - app-network
    restart: unless-stopped

  app:
    build: .                     
    container_name: app
    ports:
      - "80:5000"                
    environment:
      - MONGO_URI=mongodb://mongodb:27017/devopsdb
      - PORT=5000
    depends_on:
      - mongodb
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mongo_data:                   

networks:
  app-network:
    driver: bridge

